<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Produck.inc Uygulamaları</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 30px 20px;
      background: linear-gradient(145deg, #090d18, #181329, #101827);
      font-family: Arial, Helvetica, sans-serif;
    }

    .apps {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      margin-bottom: 24px;
      padding: 34px 24px;
      text-align: center;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .app-logo {
      width: 155px;
      height: 155px;
      object-fit: contain;
      margin-bottom: 24px;
      border-radius: 32px;
      filter: drop-shadow(0 14px 25px rgba(0, 0, 0, 0.4));
    }

    .store-link {
      display: block;
      width: fit-content;
      margin: 12px auto 0;
      transition: transform 0.2s ease;
    }

    .store-link:hover {
      transform: scale(1.03);
    }

    .app-store-badge {
      display: block;
      width: 230px;
      max-width: 100%;
    }

    .google-play-badge {
      display: block;
      width: 260px;
      max-width: 100%;
    }
  </style>
</head>

<body>

  <main class="apps">

    <!-- Tarih Master -->
    <section class="card">

      <img
        class="app-logo"
        src="assets/images/tarih-master-logo.png"
        alt="Tarih Master"
      >

      <a
        class="store-link"
        href="https://apps.apple.com/tr/app/tarih-master-kpss-haz%C4%B1rl%C4%B1k/id6770333147?l=tr"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          class="app-store-badge"
          src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83"
          alt="App Store’dan İndir"
        >
      </a>

      <a
        class="store-link"
        href="https://play.google.com/store/apps/details?id=com.produckinc.kpsstarihpro"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          class="google-play-badge"
          src="https://play.google.com/intl/en_us/badges/static/images/badges/tr_badge_web_generic.png"
          alt="Google Play’den İndir"
        >
      </a>

    </section>

    <!-- LGS Master -->
    <section class="card">

      <img
        class="app-logo"
        src="assets/images/lgs-master-logo.png"
        alt="LGS Master"
      >

      <a
        class="store-link"
        href="https://apps.apple.com/tr/app/lgs-master/id6771523589?l=tr"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          class="app-store-badge"
          src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83"
          alt="App Store’dan İndir"
        >
      </a>

      <a
        class="store-link"
        href="https://play.google.com/store/apps/details?id=com.produckinc.lgsmaster"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          class="google-play-badge"
          src="https://play.google.com/intl/en_us/badges/static/images/badges/tr_badge_web_generic.png"
          alt="Google Play’den İndir"
        >
      </a>

    </section>

  </main>

</body>
</html>
